<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블루 수소 CCUS 통합 대시보드</title>
    <style>
        :root {
            --primary: #0f172a; --secondary: #3b82f6; --bg-color: #f8fafc;
            --box-bg: #ffffff; --border: #e2e8f0; --text-main: #1e293b; --text-sub: #64748b;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; text-align: center; }
        .subtitle { color: var(--text-sub); font-size: 0.9rem; margin-bottom: 20px; text-align: center; }
        .container { display: flex; gap: 20px; max-width: 1200px; width: 100%; }
        .sidebar { flex: 1; background: var(--box-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; height: fit-content; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #e2e8f0; font-weight: bold; color: var(--text-sub); }
        .tab-btn.active { background: var(--primary); color: white; }
        .list-container { max-height: 65vh; overflow-y: auto; padding-right: 5px; }
        .item-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #f1f5f9; border: 1px solid var(--border); border-radius: 8px; text-align: left; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .item-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .content { flex: 2; }
        .card { background: var(--box-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; min-height: 520px; }
        .card-title { font-size: 1.2rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .prop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .prop-item { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .prop-label { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 4px; }
        .prop-value { font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        .prop-unit { font-size: 0.8rem; color: var(--text-sub); font-weight: normal; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f1f5f9; }
        .zero-val { color: #cbd5e1; }
        .highlight-val { color: #10b981; font-weight: bold; }
        .process-info-box { background: #f8fafc; border-left: 4px solid var(--secondary); padding: 15px; margin-bottom: 15px; border-radius: 0 8px 8px 0; }
        .process-info-box h3 { margin: 0 0 8px 0; font-size: 0.95rem; color: var(--primary); }
        .process-info-box p { margin: 0; line-height: 1.5; font-size: 0.9rem; }
        .flow-tag { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; margin-right: 10px; }
        .equation { font-family: monospace; font-weight: bold; color: #b91c1c; background: #fee2e2; padding: 6px 10px; border-radius: 4px; display: inline-block; margin-top: 5px; font-size: 1rem;}
        @media (max-width: 800px) { .container { flex-direction: column; } .list-container { max-height: 250px; } }
    </style>
</head>
<body>
    <h1>블루 수소 CCUS 통합 대시보드</h1>
    <div class="subtitle">수소 114,156 kg/hr 생산 설계 및 공정-스트림 관계망</div>
    <div class="container">
        <div class="sidebar">
            <div class="tabs">
                <button class="tab-btn active" id="tab-stream" onclick="switchTab('stream')">스트림 정보</button>
                <button class="tab-btn" id="tab-process" onclick="switchTab('process')">공정 설명</button>
            </div>
            <div class="list-container" id="list-container"></div>
        </div>
        <div class="content">
            <div class="card" id="view-stream">
                <div class="card-title" id="stream-title">스트림 선택</div>
                <div class="prop-grid">
                    <div class="prop-item"><div class="prop-label">온도</div><div class="prop-value" id="v-temp">-</div></div>
                    <div class="prop-item"><div class="prop-label">압력</div><div class="prop-value" id="v-press">-</div></div>
                    <div class="prop-item"><div class="prop-label">질량 유량</div><div class="prop-value" id="v-mass">-</div></div>
                    <div class="prop-item"><div class="prop-label">엔탈피 흐름</div><div class="prop-value" id="v-enth">-</div></div>
                </div>
                <h3>몰분율 (Mole Fraction)</h3>
                <table>
                    <thead><tr><th>성분명</th><th>화학식</th><th>분율</th></tr></thead>
                    <tbody id="mole-body"></tbody>
                </table>
            </div>
            <div class="card" id="view-process" style="display: none;">
                <div class="card-title" id="process-title">공정 선택</div>
                <div class="process-info-box"><h3>🗺️ 입출력 스트림 (Stream Flow)</h3><p id="p-flow"></p></div>
                <div class="process-info-box"><h3>📝 공정 설명</h3><p id="p-desc"></p></div>
                <div class="process-info-box"><h3>🧪 화학 반응식</h3><p id="p-chem"></p></div>
                <div class="process-info-box"><h3>⚡ 에너지 보존식</h3><p id="p-energy" class="equation"></p></div>
            </div>
        </div>
    </div>
    <script>

            15: { name: "개질기 버너 연료", temp: 15.0, press: 3.10, mass: 65731, enth: -296.84, mols: {"Ar":0,"CH4":0.9310,"CH4S":0,"C2H6":0.0320,"C3H8":0.0070,"C4H10":0.0040,"CO":0,"CO2":0.0100,"H2":0,"H2O":0,"N2":0.0160,"O2":0,"SO2":0} },

            20: { name: "최종 압축 이산화탄소", temp: 30.0, press: 15.27, mass: 1091433, enth: -10035.35, mols: {"Ar":0,"CH4":0,"CH4S":0,"C2H6":0,"C3H8":0,"C4H10":0,"CO":0,"CO2":0.9995,"H2":0,"H2O":0.0005,"N2":0,"O2":0,"SO2":0} },
            21: { name: "시스템 배출 가스", temp: 30.0, press: 0.10, mass: 2762399, enth: -1224.32, mols: {"Ar":0.0110,"CH4":0,"CH4S":0,"C2H6":0,"C3H8":0,"C4H10":0,"CO":0,"CO2":0.0100,"H2":0,"H2O":0.0358,"N2":0.9209,"O2":0.0224,"SO2":0} }
        };
        const pData = {
            1: { name: "공기 압축", flow: "S1 → S2", desc: "개질기 버너 연소에 필요한 공기를 도입하여 필요한 반응 압력으로 승압합니다.", chem: "없음 (물리적 압축)", energy: "ṁ₁h₁ + W_air = ṁ₂h₂" },
            2: { name: "원료 탈황", flow: "S4 → S5", desc: "촉매 보호를 위해 천연가스 내 황 화합물을 수소 첨가 및 흡착 반응으로 제거합니다.", chem: "H₂S + ZnO &rarr; ZnS + H₂O", energy: "ṁ₄h₄ + H_rec = ṁ₅h₅ + &Delta;H_rxn" },
            3: { name: "예비 개질", flow: "S5, S6 → S7", desc: "메인 개질기 전 단계에서 중질 탄화수소를 분해하여 탄소 침착(Coking)을 방지합니다.", chem: "CnHm + nH₂O &rarr; (n+m/2)H₂ + nCO", energy: "ṁ₅h₅ + ṁ₆h₆ = ṁ₇h₇ + &Delta;H_pre" },
            4: { name: "메인 개질기(SMR)", flow: "S7, S15, S2 → S8, S17", desc: "고온에서 메탄과 수증기를 반응시켜 수소와 일산화탄소 위주의 합성가스를 생산합니다.", chem: "1. CH₄ + H₂O &rightleftharpoons; CO + 3H₂ (흡열)<br>2. CO + H₂O &rightleftharpoons; CO₂ + H₂ (발열)", energy: "Q_comb + ṁ₇h₇ = ṁ₈h₈ + ṁ₁₇h₁₇" },
            5: { name: "폐열 회수", flow: "S8 → S9", desc: "고온의 반응 가스가 가진 열을 회수하여 공정용 고압 증기를 생산합니다.", chem: "없음 (물리적 열교환)", energy: "ṁ₈h₈ = ṁ₉h₉ + Q_recovery" },
            6: { name: "수성가스 전이", flow: "S9 → S10", desc: "개질 가스 내 CO를 추가적으로 수증기와 반응시켜 H₂와 CO₂로 전환합니다.", chem: "CO + H₂O &rightleftharpoons; CO₂ + H₂", energy: "ṁ₉h₉ = ṁ₁₀h₁₀ + &Delta;H_shift" },
            7: { name: "수분 분리", flow: "S10 → S11, Water", desc: "냉각된 가스 흐름에서 기체 상태의 수증기를 액체로 응축시켜 분리합니다.", chem: "H₂O(g) &rarr; H₂O(l)", energy: "ṁ₁₀h₁₀ = ṁ₁₁h₁₁ + ṁ_water h_water" },

            9: { name: "수소 정제(PSA)", flow: "PSA Feed → S12, S14", desc: "압력순환흡착 방식을 통해 미량의 불순물을 제거하여 99.99% 고순도 수소를 얻습니다.", chem: "없음 (물리적 흡착)", energy: "H_in = ṁ₁₂h₁₂ + ṁ₁₄h₁₄" },
            10: { name: "수소 압축", flow: "S12 → S13", desc: "생산된 고순도 수소를 저장 및 운송을 위한 목표 압력으로 압축합니다.", chem: "없음 (물리적 압축)", energy: "ṁ₁₂h₁₂ + W_H2_comp = ṁ₁₃h₁₃" },
            11: { name: "배기가스 포집", flow: "S17 → S19, S21", desc: "개질기 연소 후 배출되는 배기가스 내 저농도 이산화탄소를 추가로 포집합니다.", chem: "CO₂ + Absorbent &rarr; Bound", energy: "ṁ₁₇h₁₇ = ṁ₁₉h₁₉ + ṁ₂₁h₂₁ + &Delta;H_cap" },

        };
        const cNames = {"Ar":"아르곤","CH4":"메탄","CH4S":"메탄티올","C2H6":"에탄","C3H8":"프로판","C4H10":"부탄","CO":"일산화탄소","CO2":"이산화탄소","H2":"수소","H2O":"수분","N2":"질소","O2":"산소","SO2":"이산화황"};
        let mode = 'stream';
        function switchTab(m) {
            mode = m;
            document.getElementById('tab-stream').classList.toggle('active', m==='stream');
            document.getElementById('tab-process').classList.toggle('active', m==='process');
            document.getElementById('view-stream').style.display = m==='stream' ? 'block' : 'none';
            document.getElementById('view-process').style.display = m==='process' ? 'block' : 'none';
            render();
        }
        function render() {
            const cont = document.getElementById('list-container');
            cont.innerHTML = '';
            if (mode === 'stream') {
                for(let i=1; i<=21; i++) {
                    const b = document.createElement('button');
                    b.className = 'item-btn'; b.innerText = `[${i}] ${sData[i].name}`;
                    b.onclick = () => showStream(i, b);
                    cont.appendChild(b);
                }
                showStream(13, cont.children[12]);
            } else {
                for(let i=1; i<=12; i++) {
                    const b = document.createElement('button');
                    b.className = 'item-btn'; b.innerText = `${i}. ${pData[i].name}`;
                    b.onclick = () => showProcess(i, b);
                    cont.appendChild(b);
                }
                showProcess(4, cont.children[3]);
            }
        }
        function showStream(id, b) {
            document.querySelectorAll('.item-btn').forEach(x => x.classList.remove('active'));
            if(b) b.classList.add('active');
            const d = sData[id];
            document.getElementById('stream-title').innerText = `스트림 ${id} : ${d.name}`;
            document.getElementById('v-temp').innerHTML = d.temp.toFixed(1) + ' °C';
            document.getElementById('v-press').innerHTML = d.press.toFixed(2) + ' MPa';
            document.getElementById('v-mass').innerHTML = d.mass.toLocaleString() + ' kg/hr';
            document.getElementById('v-enth').innerHTML = d.enth.toFixed(2) + ' GJ/hr';
            const body = document.getElementById('mole-body');
            body.innerHTML = '';
            for(let k in d.mols) {
                const tr = document.createElement('tr');
                const v = d.mols[k];
                const cls = v === 0 ? 'zero-val' : (v > 0.5 ? 'highlight-val' : '');
                tr.innerHTML = `<td>${cNames[k]}</td><td>${k.replace(/(\d+)/g, '<sub>$1</sub>')}</td><td class="${cls}">${v.toFixed(4)}</td>`;
                body.appendChild(tr);
            }
        }
        function showProcess(id, b) {
            document.querySelectorAll('.item-btn').forEach(x => x.classList.remove('active'));
            if(b) b.classList.add('active');
            const d = pData[id];
            document.getElementById('process-title').innerText = `공정 ${id} : ${d.name}`;
            document.getElementById('p-flow').innerHTML = `<span class="flow-tag">${d.flow}</span>`;
            document.getElementById('p-desc').innerText = d.desc;
            document.getElementById('p-chem').innerHTML = d.chem;
            document.getElementById('p-energy').innerHTML = d.energy.replace(/(\d+)/g, '<sub>$1</sub>');
        }
        window.onload = render;
    </script>
</body>
</html>
